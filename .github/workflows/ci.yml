name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  django-checks:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-secret-key
      DATABASE_URL: sqlite:///./var/ci.sqlite3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/prod.txt

      - name: Prepare runtime dirs
        run: mkdir -p var var/static var/media

      - name: Django system checks
        run: python manage.py check

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Bootstrap roles
        run: python manage.py bootstrap_roles

      - name: Collect static assets
        run: python manage.py collectstatic --noinput

      - name: Verify no missing migrations
        run: python manage.py makemigrations --check --dry-run
