services:
  web:
    build:
      context: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://inventory:inventory@db:5432/inventory
      RUN_MIGRATIONS: "1"
      RUN_COLLECTSTATIC: "1"
      DJANGO_SETTINGS_MODULE: config.settings.prod
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live/')"]
      interval: 15s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
