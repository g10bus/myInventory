{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Мой Инвентарь{% endblock %}</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/style-main.css' %}">
    <link rel="shortcut icon" href="{% static 'images/logo-box.png' %}" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        {% include "include/navbar.html" %}

        <main class="page-shell">
            {% if messages %}
                <div class="flash-stack">
                    {% for message in messages %}
                        <div class="flash-message flash-{{ message.tags|default:'info' }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}

            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
